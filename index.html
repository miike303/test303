<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simon - Jeu de Mémoire</title>
<style>
  /* --- DESIGN ET ERGONOMIE (CSS) --- */
  body {
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background-color: #1a1a24;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: white;
    transition: background-color 0.2s;
  }

  /* Le plateau circulaire */
  .game-container {
    position: relative;
    width: 450px;
    height: 450px;
    border-radius: 50%;
    background-color: #2a2a35;
    box-shadow: 0 15px 35px rgba(0,0,0,0.5);
    overflow: hidden;
    display: flex;
    flex-wrap: wrap;
    padding: 15px;
    gap: 15px;
    box-sizing: border-box;
  }

  /* Les 4 boutons de couleur */
  .pad {
    width: calc(50% - 7.5px);
    height: calc(50% - 7.5px);
    cursor: pointer;
    transition: filter 0.15s, transform 0.1s;
    opacity: 0.7;
    box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
  }

  /* Forme des quartiers de cercle */
  .green  { background-color: #00a74a; border-top-left-radius: 100%; color: #00ff73; }
  .red    { background-color: #9f0f17; border-top-right-radius: 100%; color: #ff4c4c; }
  .yellow { background-color: #cca707; border-bottom-left-radius: 100%; color: #fed93f; }
  .blue   { background-color: #094a8f; border-bottom-right-radius: 100%; color: #1c8cff; }

  /* Effets au clic et à l'activation */
  .pad:active { transform: scale(0.97); }
  .pad.active {
    opacity: 1;
    filter: brightness(1.8) drop-shadow(0 0 25px currentColor);
    z-index: 10;
  }

  /* Interface centrale (Score et Bouton) */
  .center-ui {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 200px;
    height: 200px;
    background-color: #1a1a24;
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    border: 12px solid #2a2a35;
    z-index: 5;
    box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 0 15px rgba(0,0,0,0.5);
  }

  h1 {
    margin: 0;
    font-size: 32px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #eaeaea;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
  }

  #score {
    font-size: 22px;
    margin: 15px 0;
    font-weight: bold;
    color: #777;
    transition: color 0.3s;
  }

  .game-over-text { color: #ff4c4c !important; }

  button {
    padding: 12px 25px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    border: none;
    border-radius: 25px;
    background: linear-gradient(135deg, #4CAF50, #2E7D32);
    color: white;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: transform 0.1s, box-shadow 0.2s;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  }

  button:hover { box-shadow: 0 6px 15px rgba(76, 175, 80, 0.4); }
  button:active { transform: scale(0.95); }

  /* Rendre le jeu responsive pour mobile */
  @media (max-width: 500px) {
    .game-container { width: 320px; height: 320px; }
    .center-ui { width: 140px; height: 140px; border-width: 8px; }
    h1 { font-size: 24px; }
    #score { font-size: 18px; }
    button { padding: 8px 16px; font-size: 14px; }
  }
</style>
</head>
<body>

<div class="game-container">
  <div class="pad green" id="0"></div>
  <div class="pad red" id="1"></div>
  <div class="pad yellow" id="2"></div>
  <div class="pad blue" id="3"></div>
  
  <div class="center-ui">
    <h1>Simon</h1>
    <div id="score">Prêt ?</div>
    <button id="start-btn">Jouer</button>
  </div>
</div>

<script>
  /* --- LOGIQUE DU JEU (JAVASCRIPT) --- */
  const pads = document.querySelectorAll('.pad');
  const startBtn = document.getElementById('start-btn');
  const scoreDisplay = document.getElementById('score');

  let sequence = [];
  let playerSequence = [];
  let level = 0;
  let canClick = false;

  // Configuration Audio (Sons classiques du Simon)
  const AudioContext = window.AudioContext || window.webkitAudioContext;
  const audioCtx = new AudioContext();
  const frequencies = [329.6, 261.6, 277.2, 415.3]; // Mi4 (Vert), Do4 (Rouge), Do#4 (Jaune), Sol#4 (Bleu)

  // Fonction pour jouer une note
  function playTone(freq, duration) {
    if(audioCtx.state === 'suspended') audioCtx.resume();
    const oscillator = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    
    oscillator.type = 'sine'; // Son doux
    oscillator.frequency.value = freq;
    
    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    
    oscillator.start();
    // Baisse progressive du volume pour éviter les "clics" audios
    gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
    oscillator.stop(audioCtx.currentTime + duration);
  }

  // Fonction pour le son d'erreur
  function playErrorTone() {
    if(audioCtx.state === 'suspended') audioCtx.resume();
    const oscillator = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    
    oscillator.type = 'sawtooth'; // Son plus agressif pour l'erreur
    oscillator.frequency.value = 110; // Note grave
    
    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    
    oscillator.start();
    gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.8);
    oscillator.stop(audioCtx.currentTime + 0.8);
  }

  // Illumine un bouton et joue son son
  function activatePad(id) {
    const pad = document.getElementById(id);
    pad.classList.add('active');
    playTone(frequencies[id], 0.4);
    
    setTimeout(() => {
      pad.classList.remove('active');
    }, 300);
  }

  // Passe au niveau suivant
  function nextLevel() {
    level++;
    playerSequence = [];
    scoreDisplay.textContent = `Niveau ${level}`;
    scoreDisplay.classList.remove('game-over-text');
    
    // Ajoute une nouvelle couleur aléatoire (0 à 3) à la séquence
    const nextColor = Math.floor(Math.random() * 4);
    sequence.push(nextColor);
    
    playSequence();
  }

  // Joue la séquence enregistrée par l'ordinateur
  function playSequence() {
    canClick = false; // Bloque les clics du joueur pendant la démonstration
    let delay = 0;
    
    sequence.forEach((color, index) => {
      setTimeout(() => {
        activatePad(color);
      }, delay);
      // Accélère légèrement la séquence au fur et à mesure des niveaux
      let speed = Math.max(400, 800 - (level * 20)); 
      delay += speed;
    });
    
    // Autorise le joueur à cliquer une fois la séquence terminée
    setTimeout(() => {
      canClick = true;
    }, delay);
  }

  // Gère le clic du joueur
  function handlePadClick(e) {
    if (!canClick) return;
    
    const colorId = parseInt(e.target.id);
    activatePad(colorId);
    playerSequence.push(colorId);
    
    checkSequence(playerSequence.length - 1);
  }

  // Vérifie si le joueur a cliqué sur la bonne couleur
  function checkSequence(currentStep) {
    // Si la couleur est fausse
    if (playerSequence[currentStep] !== sequence[currentStep]) {
      gameOver();
      return;
    }
    
    // Si le joueur a terminé la séquence complète avec succès
    if (playerSequence.length === sequence.length) {
      canClick = false;
      setTimeout(nextLevel, 1000); // Pause avant le prochain niveau
    }
  }

  // Gère la fin de partie
  function gameOver() {
    playErrorTone();
    scoreDisplay.textContent = "PERDU !";
    scoreDisplay.classList.add('game-over-text');
    
    // Flash rouge sur l'écran
    document.body.style.backgroundColor = '#4a0909';
    setTimeout(() => { document.body.style.backgroundColor = '#1a1a24'; }, 300);
    
    // Réinitialisation de l'état
    sequence = [];
    canClick = false;
    
    // Réaffiche le bouton jouer
    startBtn.textContent = "Rejouer";
    startBtn.style.display = 'block';
  }

  // Lance le jeu
  startBtn.addEventListener('click', () => {
    // Nécessaire pour initialiser l'audio sur certains navigateurs
    if(audioCtx.state === 'suspended') audioCtx.resume(); 
    
    startBtn.style.display = 'none';
    level = 0;
    sequence = [];
    
    setTimeout(nextLevel, 500);
  });

  // Attache les événements de clics aux boutons de couleur
  pads.forEach(pad => pad.addEventListener('click', handlePadClick));

</script>
</body>
</html>
