<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIMON 2026: Édition Interstellaire</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
<style>
  /* --- STYLES DE BASE ET ARRIÈRE-PLAN --- */
  :root {
    --bg-color: #030308;
    --machine-body: #12121e;
    --machine-rim: #1e1e2d;
    --center-bg: #090912;
    --card-bg: rgba(18, 18, 30, 0.7);
    --card-border: rgba(255, 255, 255, 0.1);

    /* Couleurs actives (allumées) - Effet iris/néon */
    --pad-g-on: #00ffaa;
    --pad-r-on: #ff4d4d;
    --pad-y-on: #ffd933;
    --pad-b-on: #33aaff;

    /* Couleurs de base (éteintes) - Teintes de cristal */
    --pad-g-off: #005a3c;
    --pad-r-off: #802626;
    --pad-y-off: #806c1a;
    --pad-b-off: #1a5680;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background-color: var(--bg-color);
    background-image:
      radial-gradient(circle at 10% 10%, rgba(30, 30, 60, 0.4) 0%, transparent 40%),
      radial-gradient(circle at 90% 90%, rgba(30, 100, 30, 0.3) 0%, transparent 40%),
      radial-gradient(circle at 50% 50%, #0d0d1a 0%, #030308 100%);
    font-family: 'Poppins', sans-serif;
    color: white;
    user-select: none;
    overflow: hidden;
  }

  /* --- LOGO ET MISE EN PAGE --- */
  .app-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 40px;
    width: 100%;
    max-width: 1000px;
    padding: 20px;
  }

  header {
    width: 100%;
    text-align: center;
  }

  .logo {
    font-family: 'Orbitron', sans-serif;
    font-size: 32px;
    font-weight: 800;
    letter-spacing: 6px;
    color: #fff;
    text-shadow: 0 0 15px rgba(255, 255, 255, 0.5), 0 0 30px rgba(0, 255, 255, 0.3);
    margin-bottom: 20px;
  }

  main {
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
    gap: 40px;
  }

  /* --- CARTES DE STATUT ÉPURÉES --- */
  .status-panel {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .card {
    background-color: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 16px;
    padding: 16px 24px;
    width: 200px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5), inset 0 2px 4px rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(8px);
    transition: transform 0.2s;
  }

  .card:hover { transform: translateY(-2px); }

  .label {
    font-size: 11px;
    font-weight: 600;
    color: #6a6a7a;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .value {
    font-family: 'Orbitron', sans-serif;
    font-size: 32px;
    font-weight: 800;
    color: #fff;
    line-height: 1;
  }

  .record-value {
    color: var(--pad-g-on);
    text-shadow: 0 0 10px rgba(0, 255, 170, 0.4);
  }

  /* --- LE CONTRÔLEUR SIMON (EFFET WOW) --- */
  @keyframes shake {
    0%, 100% { transform: translate(0, 0); }
    20% { transform: translate(-5px, 3px); }
    40% { transform: translate(5px, -3px); }
    60% { transform: translate(-5px, -3px); }
    80% { transform: translate(5px, 3px); }
  }

  .shake { animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both; }

  .game-board {
    position: relative;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: linear-gradient(145deg, var(--machine-rim), var(--machine-body));
    box-shadow:
      0 40px 80px rgba(0, 0, 0, 0.9),
      inset 0 4px 10px rgba(255, 255, 255, 0.03),
      inset 0 -10px 20px rgba(0, 0, 0, 0.6);
    padding: 16px;
  }

  .simon-controller {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 16px;
    overflow: hidden;
  }

  /* Style des boutons (Effet de cristal) */
  .pad {
    width: 100%;
    height: 100%;
    cursor: pointer;
    transition: background-color 0.1s, box-shadow 0.1s;
    box-shadow:
      inset -4px -4px 12px rgba(0, 0, 0, 0.5),
      inset 4px 4px 12px rgba(255, 255, 255, 0.1);
  }

  .green  { background-color: var(--pad-g-off); border-radius: 100% 0 0 0; }
  .red    { background-color: var(--pad-r-off); border-radius: 0 100% 0 0; }
  .yellow { background-color: var(--pad-y-off); border-radius: 0 0 0 100%; }
  .blue   { background-color: var(--pad-b-off); border-radius: 0 0 100% 0; }

  /* ÉTAT ILLUMINÉ (Effet WOW de cristal laser) */
  .green.active {
    background-color: var(--pad-g-on);
    box-shadow: inset 0 0 50px rgba(255, 255, 255, 0.7), inset 2px 2px 10px rgba(255, 255, 255, 0.9);
    filter: drop-shadow(0 0 20px rgba(0, 255, 170, 0.7));
  }
  .red.active {
    background-color: var(--pad-r-on);
    box-shadow: inset 0 0 50px rgba(255, 255, 255, 0.7), inset 2px 2px 10px rgba(255, 255, 255, 0.9);
    filter: drop-shadow(0 0 20px rgba(255, 77, 77, 0.7));
  }
  .yellow.active {
    background-color: var(--pad-y-on);
    box-shadow: inset 0 0 50px rgba(255, 255, 255, 0.7), inset 2px 2px 10px rgba(255, 255, 255, 0.9);
    filter: drop-shadow(0 0 20px rgba(255, 217, 51, 0.7));
  }
  .blue.active {
    background-color: var(--pad-b-on);
    box-shadow: inset 0 0 50px rgba(255, 255, 255, 0.7), inset 2px 2px 10px rgba(255, 255, 255, 0.9);
    filter: drop-shadow(0 0 20px rgba(51, 170, 255, 0.7));
  }

  /* CONSOLE CENTRALE ÉPURÉE */
  .center-display {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 240px;
    height: 240px;
    background-color: var(--center-bg);
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    border: 16px solid var(--machine-rim);
    box-shadow:
      0 12px 24px rgba(0, 0, 0, 0.7),
      inset 0 4px 15px rgba(0, 0, 0, 0.8);
    z-index: 10;
  }

  .status-text {
    font-size: 12px;
    font-weight: 600;
    color: #6a6a7a;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 6px;
  }

  .game-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 26px;
    font-weight: 800;
    letter-spacing: 4px;
    color: #ffffff;
    text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
    margin-bottom: 12px;
  }

  .current-score {
    font-family: 'Orbitron', sans-serif;
    font-size: 64px;
    font-weight: 800;
    color: var(--pad-g-on);
    line-height: 1;
    margin-bottom: 6px;
    text-shadow: 0 0 20px rgba(0, 255, 170, 0.5);
    transition: color 0.3s, text-shadow 0.3s;
  }

  .record-text {
    font-size: 11px;
    font-weight: 600;
    color: #6a6a7a;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* --- EFFETS DE PARTICULES ET HALO --- */
  .particle-system {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 5;
  }

  @keyframes pulse-halo {
    0%, 100% { opacity: 0.2; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 0.4; transform: translate(-50%, -50%) scale(1.05); }
  }

  .halo-ring {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 100%;
    height: 100%;
    border-radius: 50%;
    border: 12px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 0 60px rgba(255, 255, 255, 0.1);
    animation: pulse-halo 4s infinite linear;
    pointer-events: none;
    z-index: 2;
  }

  /* RESPONSIVE */
  @media (max-width: 800px) {
    body { overflow-y: auto; }
    main { flex-direction: column-reverse; gap: 20px; }
    .status-panel { flex-direction: row; gap: 10px; flex-wrap: wrap; justify-content: center; }
    .card { width: 150px; padding: 12px 16px; }
    .value { font-size: 26px; }
    .game-board { width: 380px; height: 380px; padding: 12px; }
    .center-display { width: 180px; height: 180px; border-width: 12px; }
    .game-title { font-size: 20px; letter-spacing: 2px; }
    .current-score { font-size: 48px; }
  }
</style>
</head>
<body>

<div class="app-container">
  <header>
    <div class="logo">SIMON 2026</div>
  </header>

  <main>
    <div class="status-panel">
      <div class="card"><div class="label">NIVEAU</div><div class="value" id="level-val">1</div></div>
      <div class="card"><div class="label">COMBO MAX</div><div class="value" id="combo-val">x1</div></div>
      <div class="card"><div class="label">MEILLEUR SCORE</div><div class="value record-value" id="best-val">2712</div></div>
    </div>

    <div class="game-board" id="game-board">
      <div class="particle-system" id="particles"></div>
      <div class="halo-ring"></div>

      <div class="simon-controller">
        <div class="pad green" id="0"></div>
        <div class="pad red" id="1"></div>
        <div class="pad yellow" id="2"></div>
        <div class="pad blue" id="3"></div>
      </div>

      <div class="center-display">
        <div class="status-text" id="status-display">PRÊT</div>
        <div class="game-title">SIMON 2026</div>
        <div class="current-score" id="score-display">12</div>
        <div class="record-text" id="record-display">RECORD : 2712</div>
      </div>
    </div>
  </main>
</div>

<script>
  /* --- LOGIQUE DU JEU --- */
  const pads = document.querySelectorAll('.pad');
  const scoreDisplay = document.getElementById('score-display');
  const levelVal = document.getElementById('level-val');
  const comboVal = document.getElementById('combo-val');
  const bestVal = document.getElementById('best-val');
  const statusDisplay = document.getElementById('status-display');
  const recordDisplay = document.getElementById('record-display');
  const gameBoard = document.getElementById('game-board');
  const particlesContainer = document.getElementById('particles');

  let sequence = [];
  let playerSequence = [];
  let level = 1;
  let score = 12;
  let canClick = false;

  let lastClickTime = 0;
  let currentCombo = 1;
  let maxCombo = 1;
  const COMBO_TIME_LIMIT = 800;

  // Gestion du meilleur score local
  let bestScore = Number(localStorage.getItem('simon2026Record') || 2712);
  bestVal.textContent = bestScore;
  recordDisplay.textContent = `RECORD : ${bestScore}`;

  // Audio (Générateur natif)
  const AudioContextClass = window.AudioContext || window.webkitAudioContext;
  const audioCtx = AudioContextClass ? new AudioContextClass() : null;
  const frequencies = [329.6, 261.6, 277.2, 415.3];

  function playTone(freq, duration, type = 'sine') {
    if (!audioCtx) return;
    if (audioCtx.state === 'suspended') audioCtx.resume();

    const oscillator = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();

    oscillator.type = type;
    oscillator.frequency.value = freq;

    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    oscillator.start();
    gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    oscillator.stop(audioCtx.currentTime + duration);
  }

  // --- EFFETS VISUELS ET PARTICULES (EFFET WOW) ---
  function createPadParticles(colorId) {
    const colors = ['#00ffaa', '#ff4d4d', '#ffd933', '#33aaff'];
    const particleColor = colors[colorId];

    for (let i = 0; i < 30; i++) {
      const particle = document.createElement('div');
      particle.className = 'particle';
      particle.style.background = particleColor;
      particle.style.left = `${Math.random() * 100}%`;
      particle.style.top = `${Math.random() * 100}%`;
      particle.style.width = `${Math.random() * 6 + 2}px`;
      particle.style.height = particle.style.width;

      const angle = Math.random() * Math.PI * 2;
      const velocity = Math.random() * 8 + 4;
      particle.velocityX = Math.cos(angle) * velocity;
      particle.velocityY = Math.sin(angle) * velocity;

      particlesContainer.appendChild(particle);
      setTimeout(() => particle.remove(), 1000);
    }
  }

  function activatePad(id, isPlayer = false) {
    const pad = document.getElementById(String(id));
    pad.classList.add('active');
    playTone(frequencies[id], 0.3);
    if (isPlayer) createPadParticles(id);

    setTimeout(() => {
      pad.classList.remove('active');
    }, 250);
  }

  function nextLevel() {
    level++;
    levelVal.textContent = level;
    playerSequence = [];
    currentCombo = 1;
    comboVal.textContent = 'x1';

    const nextColor = Math.floor(Math.random() * 4);
    sequence.push(nextColor);

    playSequence();
  }

  function playSequence() {
    canClick = false;
    statusDisplay.textContent = 'ATTENTE';
    statusDisplay.style.color = '#6a6a7a';

    let delay = 500;

    sequence.forEach((color) => {
      setTimeout(() => {
        activatePad(color);
      }, delay);
      const speed = Math.max(250, 650 - (level * 30));
      delay += speed;
    });

    setTimeout(() => {
      canClick = true;
      statusDisplay.textContent = 'À VOUS DE JOUER';
      statusDisplay.style.color = 'var(--pad-g-on)';
      lastClickTime = Date.now();
    }, delay);
  }

  function updateScore(points) {
    score += points;

    let currentVal = parseInt(scoreDisplay.textContent, 10);
    const step = Math.max(1, Math.ceil(points / 10));

    const timer = setInterval(() => {
      currentVal += step;
      if (currentVal >= score) {
        currentVal = score;
        clearInterval(timer);
      }
      scoreDisplay.textContent = currentVal;
    }, 20);
  }

  function handlePadClick(e) {
    if (!canClick) return;

    const colorId = parseInt(e.target.id, 10);
    activatePad(colorId, true);
    playerSequence.push(colorId);

    const now = Date.now();
    if (now - lastClickTime < COMBO_TIME_LIMIT) {
      currentCombo++;
      if (currentCombo > maxCombo) {
        maxCombo = currentCombo;
        comboVal.textContent = `x${maxCombo}`;
      }
    } else {
      currentCombo = 1;
    }
    lastClickTime = now;

    checkSequence(playerSequence.length - 1);
  }

  function checkSequence(currentStep) {
    if (playerSequence[currentStep] !== sequence[currentStep]) {
      gameOver();
      return;
    }

    const pointsGained = 10 * currentCombo * level;
    updateScore(pointsGained);

    if (playerSequence.length === sequence.length) {
      canClick = false;
      setTimeout(nextLevel, 800);
    }
  }

  function gameOver() {
    playTone(100, 1, 'sawtooth');
    canClick = false;
    statusDisplay.textContent = 'PERDU';
    statusDisplay.style.color = 'var(--pad-r-on)';

    gameBoard.classList.add('shake');
    setTimeout(() => gameBoard.classList.remove('shake'), 300);

    if (score > bestScore) {
      bestScore = score;
      localStorage.setItem('simon2026Record', String(bestScore));
      bestVal.textContent = bestScore;
      recordDisplay.textContent = `RECORD : ${bestScore}`;
      recordDisplay.style.color = 'var(--pad-y-on)';
    }

    scoreDisplay.style.color = 'var(--pad-r-on)';
    scoreDisplay.style.textShadow = '0 0 15px rgba(255, 77, 77, 0.4)';

    // Le jeu se réinitialise après un moment
    setTimeout(startGame, 2000);
  }

  function startGame() {
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();

    // Réinitialiser les scores et états
    scoreDisplay.style.color = 'var(--pad-g-on)';
    scoreDisplay.style.textShadow = '0 0 15px rgba(0, 255, 170, 0.4)';
    recordDisplay.style.color = '#6a6a7a';
    statusDisplay.textContent = 'PRÊT';
    statusDisplay.style.color = '#6a6a7a';

    level = 1;
    levelVal.textContent = level;
    score = 12;
    scoreDisplay.textContent = '12';
    currentCombo = 1;
    maxCombo = 1;
    comboVal.textContent = 'x1';
    sequence = [];
    playerSequence = [];

    // Commencer le premier niveau
    setTimeout(nextLevel, 500);
  }

  pads.forEach((pad) => pad.addEventListener('click', handlePadClick));

  // Ajouter des styles pour les particules
  const styleSheet = document.createElement('style');
  styleSheet.type = 'text/css';
  styleSheet.innerText = `
    .particle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      animation: move-particle 1s ease-out forwards;
      z-index: 5;
    }
    @keyframes move-particle {
      0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      100% { transform: translate(calc(-50% + 50px), calc(-50% + 50px)) scale(0); opacity: 0; }
    }
  `;
  document.head.appendChild(styleSheet);

  // Ajouter une fonction pour animer les particules
  function animateParticles() {
    const particles = document.querySelectorAll('.particle');
    particles.forEach((particle) => {
      const currentX = parseFloat(particle.style.left);
      const currentY = parseFloat(particle.style.top);
      particle.style.left = `${currentX + particle.velocityX}px`;
      particle.style.top = `${currentY + particle.velocityY}px`;
      particle.velocityX *= 0.98;
      particle.velocityY *= 0.98;
    });
    requestAnimationFrame(animateParticles);
  }

  // Lancer l'animation des particules
  animateParticles();

  // Démarrer le jeu au chargement
  window.addEventListener('load', startGame);
</script>
</body>
</html>
