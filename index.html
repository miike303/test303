<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <meta name="theme-color" content="#08110f" />
    <title>Pocket Golf Deluxe</title>
    <meta
      name="description"
      content="Pocket Golf Deluxe is a premium mobile-first mini-golf game with a smart camera that always frames the shot."
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-shell">
      <canvas id="gameCanvas" aria-label="Pocket Golf Deluxe game canvas"></canvas>

      <div class="ambient ambient--one" aria-hidden="true"></div>
      <div class="ambient ambient--two" aria-hidden="true"></div>
      <div class="vignette" aria-hidden="true"></div>

      <header class="hud glass">
        <div class="hud__stats">
          <div class="hud-card">
            <span>Hole</span>
            <strong id="hudHole">1</strong>
          </div>
          <div class="hud-card">
            <span>Par</span>
            <strong id="hudPar">3</strong>
          </div>
          <div class="hud-card">
            <span>Strokes</span>
            <strong id="hudStrokes">0</strong>
          </div>
          <div class="hud-card">
            <span>Best</span>
            <strong id="hudBest">—</strong>
          </div>
        </div>

        <div class="hud__actions">
          <button class="icon-button" id="restartButton" aria-label="Restart current hole">↺</button>
          <button class="icon-button" id="muteButton" aria-label="Toggle sound">🔊</button>
          <button class="icon-button" id="pauseButton" aria-label="Pause game">❚❚</button>
        </div>
      </header>

      <aside class="shot-card glass">
        <div class="shot-card__top">
          <div>
            <p class="eyebrow">Smart Camera</p>
            <h1>Pocket Golf Deluxe</h1>
          </div>
          <div class="camera-badge" id="cameraModeLabel">Aiming View</div>
        </div>
        <div class="power-meter">
          <div class="power-meter__fill" id="powerFill"></div>
        </div>
        <p class="shot-card__hint" id="aimHint">
          Drag near the ball to pull back, line up the hole, and release.
        </p>
      </aside>

      <section class="overlay" id="pauseOverlay" hidden>
        <div class="panel glass">
          <p class="eyebrow">Paused</p>
          <h2>Take Your Time</h2>
          <p>Study the course, then jump back in when you are ready.</p>
          <div class="panel__actions">
            <button class="primary-button" id="resumeButton">Resume</button>
            <button class="secondary-button" id="pauseRestartButton">Restart Hole</button>
          </div>
        </div>
      </section>

      <section class="overlay" id="completeOverlay" hidden>
        <div class="panel glass">
          <p class="eyebrow">Hole Complete</p>
          <h2 id="completeTitle">Birdie!</h2>
          <p id="completeSummary">You finished in 2 strokes.</p>
          <div class="panel__stats">
            <div><span>Score</span><strong id="completeScore">-1</strong></div>
            <div><span>Best</span><strong id="completeBest">2</strong></div>
            <div><span>Total</span><strong id="completeTotal">2</strong></div>
          </div>
          <div class="panel__actions">
            <button class="primary-button" id="nextHoleButton">Next Hole</button>
            <button class="secondary-button" id="replayButton">Replay Hole</button>
          </div>
        </div>
      </section>
    </div>

    <script src="script.js"></script>
  </body>
</html>
