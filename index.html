<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris Nova</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-bg"></div>
  <main class="layout">
    <section class="main-panel card">
      <header class="title-row">
        <div>
          <p class="eyebrow">Jeu d'arcade moderne</p>
          <h1>Tetris Nova</h1>
        </div>
        <button id="restartBtn" class="btn">Recommencer</button>
      </header>

      <div class="board-wrap">
        <canvas id="board" width="400" height="800" aria-label="Plateau de Tetris"></canvas>
        <div id="gameOver" class="overlay hidden">
          <h2>Partie terminée</h2>
          <p>Appuyez sur Recommencer pour rejouer.</p>
        </div>
      </div>

      <footer class="hint-row">
        <span>← → déplacer</span>
        <span>↑ rotation</span>
        <span>↓ descente</span>
        <span>Espace chute instantanée</span>
        <span>C hold</span>
        <span>P pause</span>
      </footer>
    </section>

    <aside class="side-panel">
      <section class="card stat-grid">
        <article>
          <p>Score</p>
          <strong id="score">0</strong>
        </article>
        <article>
          <p>Niveau</p>
          <strong id="level">1</strong>
        </article>
        <article>
          <p>Lignes</p>
          <strong id="lines">0</strong>
        </article>
      </section>

      <section class="card">
        <p class="panel-title">Prochaine pièce</p>
        <canvas id="next" width="160" height="160"></canvas>
      </section>

      <section class="card">
        <p class="panel-title">Hold</p>
        <canvas id="hold" width="160" height="160"></canvas>
      </section>
    </aside>
  </main>

  <script src="js/main.js"></script>
</body>
</html>
