<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <meta name="theme-color" content="#060912" />
    <title>Micro-organismes tactiles</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app" aria-label="Simulation interactive de micro-organismes">
      <canvas id="simulation" aria-hidden="true"></canvas>
      <div class="vignette" aria-hidden="true"></div>
      <p id="hint" class="hint">Touchez l’écran</p>
      <noscript>
        <div class="fallback">Cette expérience nécessite JavaScript pour animer le canvas.</div>
      </noscript>
      <div id="canvasFallback" class="fallback fallback-hidden" role="status">
        Votre navigateur ne prend pas en charge le canvas HTML5.
      </div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
